<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>小学霸运营后台</title>
<style>
:root{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#172033;background:#f4f6fa}*{box-sizing:border-box}body{margin:0}button,input,select{font:inherit}.shell{display:flex;min-height:100vh}.side{width:230px;background:#111827;color:#dbe4f0;padding:22px 14px}.brand{font-size:20px;font-weight:700;padding:0 12px 28px;color:#fff}.nav{display:grid;gap:6px}.nav button{border:0;background:transparent;color:#aebbd0;text-align:left;padding:12px;border-radius:7px;cursor:pointer}.nav button.active,.nav button:hover{background:#263247;color:#fff}.main{flex:1;padding:28px;max-width:1500px;margin:auto;width:100%}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.top h1{font-size:25px;margin:0}.muted{color:#718096;font-size:13px}.grid{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:14px}.card,.panel{background:#fff;border:1px solid #e4e9f1;border-radius:8px;padding:18px;box-shadow:0 3px 12px #243b5308}.metric b{display:block;font-size:28px;margin-top:8px}.metric span{color:#66758a;font-size:13px}.panel{margin-top:18px}.panel h2{font-size:16px;margin:0 0 14px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.toolbar input,.toolbar select{border:1px solid #ccd5e2;border-radius:6px;padding:9px 10px;background:#fff}.primary,.danger,.ghost{border:0;border-radius:6px;padding:9px 13px;cursor:pointer}.primary{background:#2563eb;color:#fff}.danger{background:#dc2626;color:#fff}.ghost{background:#edf2f7;color:#334155}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:700px}th,td{text-align:left;padding:11px 9px;border-bottom:1px solid #edf0f5;font-size:13px;white-space:nowrap}th{color:#68768a;background:#f8fafc}.status{padding:3px 7px;border-radius:99px;background:#e7f7ed;color:#16734a;font-size:12px}.login{max-width:390px;margin:13vh auto}.login h1{margin-top:0}.login input{width:100%;margin:7px 0;padding:12px;border:1px solid #cbd5e1;border-radius:6px}.login button{width:100%;margin-top:10px}.hidden{display:none!important}.notice{padding:10px 12px;background:#fff7ed;color:#9a3412;border-radius:6px;margin-bottom:14px;font-size:13px}.error{color:#b91c1c;margin-top:10px;font-size:13px}@media(max-width:800px){.side{width:72px;padding:18px 8px}.brand{font-size:0}.brand:after{content:"学霸";font-size:17px}.nav button{font-size:0;text-align:center}.nav button:before{content:"•";font-size:22px}.main{padding:18px}.grid{grid-template-columns:repeat(2,minmax(130px,1fr))}}
</style></head><body>
<section id="loginView" class="login card"><h1>小学霸运营后台</h1><p class="muted">管理员登录，权限由服务端校验。</p><input id="loginUser" autocomplete="username" placeholder="管理员账号"><input id="loginPass" type="password" autocomplete="current-password" placeholder="管理员密码"><button class="primary" onclick="adminLogin()">登录后台</button><div id="loginError" class="error"></div></section>
<div id="appView" class="shell hidden"><aside class="side"><div class="brand">小学霸运营后台</div><nav class="nav"><button class="active" data-page="dashboard" onclick="showPage('dashboard',this)">数据概览</button><button data-page="users" onclick="showPage('users',this)">用户管理</button><button data-page="redeems" onclick="showPage('redeems',this)">兑换码</button><button data-page="logs" onclick="showPage('logs',this)">操作日志</button></nav></aside><main class="main"><div class="top"><div><h1 id="pageTitle">数据概览</h1><span class="muted" id="adminRole"></span></div><button class="ghost" onclick="logout()">退出登录</button></div><div id="page"></div></main></div>
<script>
const API="";let token=localStorage.getItem("xueba_admin_token")||"",admin=JSON.parse(localStorage.getItem("xueba_admin_user")||"null");
async function request(path,opt={}){const res=await fetch(API+path,{...opt,headers:{"Content-Type":"application/json",...(opt.headers||{}),...(token?{Authorization:"Bearer "+token}:{})}});const data=await res.json().catch(()=>({error:"服务器返回异常"}));if(!res.ok)throw new Error(data.error||"请求失败");return data;}
function adminLogin(){request("/api/admin/login",{method:"POST",body:JSON.stringify({username:loginUser.value,password:loginPass.value})}).then(x=>{token=x.token;admin=x.admin;localStorage.setItem("xueba_admin_token",token);localStorage.setItem("xueba_admin_user",JSON.stringify(admin));enter();}).catch(e=>loginError.textContent=e.message)}
function enter(){loginView.classList.add("hidden");appView.classList.remove("hidden");adminRole.textContent=admin?.name+" · "+admin?.role;showPage("dashboard",document.querySelector('[data-page="dashboard"]'))}
function logout(){localStorage.removeItem("xueba_admin_token");localStorage.removeItem("xueba_admin_user");location.reload()}
function showPage(name,el){document.querySelectorAll(".nav button").forEach(x=>x.classList.remove("active"));el?.classList.add("active");pageTitle.textContent={dashboard:"数据概览",users:"用户管理",redeems:"兑换码管理",logs:"操作日志"}[name];({dashboard:dashboard,users:users,redeems:redeems,logs:logs}[name])().catch(e=>page.innerHTML='<div class="panel error">'+e.message+'</div>')}
async function dashboard(){const x=await request("/api/admin/dashboard");page.innerHTML='<div class="grid"><div class="card metric"><span>今日新增注册</span><b>'+x.today.newUsers+'</b></div><div class="card metric"><span>今日登录用户</span><b>'+x.today.loginUsers+'</b></div><div class="card metric"><span>累计注册用户</span><b>'+x.totals.users+'</b></div><div class="card metric"><span>累计兑换码</span><b>'+x.totals.redeemGenerated+'</b></div></div><div class="panel"><h2>运营数据说明</h2><div class="notice">'+x.notice+'</div><p class="muted">DAU、留存、PV/UV、学习时长等指标将在学习事件聚合接口启用后显示，当前不使用伪造数据。</p></div>'}
async function users(){const x=await request("/api/admin/users?page=1&pageSize=100");page.innerHTML='<div class="panel"><div class="toolbar"><input id="userSearch" placeholder="搜索账号或昵称"><button class="primary" onclick="loadUsers()">搜索</button></div><div class="table-wrap"><table><thead><tr><th>账号</th><th>昵称</th><th>注册时间</th><th>最后登录</th><th>登录次数</th><th>状态</th><th>操作</th></tr></thead><tbody id="userRows">'+x.items.map(u=>'<tr><td>'+esc(u.username)+'</td><td>'+esc(u.displayName)+'</td><td>'+fmt(u.createdAt)+'</td><td>'+fmt(u.lastLoginAt)+'</td><td>'+u.loginCount+'</td><td><span class="status">'+u.status+'</span></td><td><button class="danger" onclick="toggleUser(\''+encodeURIComponent(u.id)+'\',\''+(u.status==='frozen'?'restore':'freeze')+'\')">'+(u.status==='frozen'?'恢复':'冻结')+'</button></td></tr>').join('')+'</tbody></table></div></div>'}
function loadUsers(){users()}
async function toggleUser(id,action){if(!confirm((action==='freeze'?'冻结':'恢复')+'这个账号？'))return;await request('/api/admin/users/'+id,{method:'POST',body:JSON.stringify({action})});users()}
async function redeems(){const x=await request('/api/admin/redeem-codes?page=1&pageSize=100');page.innerHTML='<div class="panel"><div class="toolbar"><select id="plan"><option value="month">月卡</option><option value="quarter">季卡</option><option value="year">年卡</option></select><select id="quantity"><option>1</option><option>10</option><option>50</option><option>100</option><option>500</option></select><input id="redeemNote" placeholder="订单备注"><button class="primary" onclick="generateCodes()">生成兑换码</button></div><div class="table-wrap"><table><thead><tr><th>兑换码</th><th>类型</th><th>批次</th><th>状态</th><th>创建时间</th><th>兑换用户</th><th>操作</th></tr></thead><tbody>'+x.items.map(r=>'<tr><td>'+esc(r.code)+'</td><td>'+esc(r.label||r.plan)+'</td><td>'+esc(r.batchId||'')+'</td><td>'+r.status+'</td><td>'+fmt(r.createdAt)+'</td><td>'+esc(r.owner||'')+'</td><td>'+(r.status==='unused'?'<button class="danger" onclick="revokeCode(\''+r.code+'\')">作废</button>':'-')+'</td></tr>').join('')+'</tbody></table></div></div>'}
async function generateCodes(){const x=await request('/api/admin/redeem-codes',{method:'POST',body:JSON.stringify({plan:plan.value,quantity:Number(quantity.value),note:redeemNote.value})});alert('已生成 '+x.codes.length+' 个兑换码，批次：'+x.batchId);redeems()}
async function revokeCode(code){if(!confirm('作废后不能恢复，确认继续？'))return;await request('/api/admin/redeem-codes/revoke',{method:'POST',body:JSON.stringify({code})});redeems()}
async function logs(){const x=await request('/api/admin/logs');page.innerHTML='<div class="panel"><div class="table-wrap"><table><thead><tr><th>时间</th><th>管理员</th><th>操作</th><th>对象</th><th>IP</th></tr></thead><tbody>'+x.items.map(r=>'<tr><td>'+fmt(r.createdAt)+'</td><td>'+esc(r.adminId)+'</td><td>'+esc(r.action)+'</td><td>'+esc(r.targetType)+' / '+esc(r.targetId)+'</td><td>'+esc(r.ipMasked)+'</td></tr>').join('')+'</tbody></table></div></div>'}
function fmt(x){return x?new Date(x).toLocaleString('zh-CN'):"-"}function esc(x){return String(x||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
if(token)request('/api/admin/dashboard').then(enter).catch(()=>logout());
</script></body></html>
